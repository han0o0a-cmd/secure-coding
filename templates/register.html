{% extends "base.html" %}
{% block content %}
<h2>회원가입</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <p>아이디 <input name="username" required></p>
  <p>비밀번호 <input name="password" type="password" required></p>
  <button type="submit">가입</button>
</form>
{% endblock %}

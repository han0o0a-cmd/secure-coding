{% extends "base.html" %}
{% block content %}
<h2>상품 수정</h2>
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <p>상품명 <input name="title" value="{{ p['title'] }}" required></p>
  <p>가격 <input name="price" type="number" min="0" value="{{ p['price'] }}" required></p>
  <p>설명 <textarea name="description">{{ p['description'] }}</textarea></p>
  <p>사진 교체 <input name="image" type="file" accept="image/*"></p>
  <button type="submit">수정</button>
</form>
{% endblock %}
